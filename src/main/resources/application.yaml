spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: SecureBankAPI

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/secure_bank_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha

  show-actuator: false

logging:
  level:
    root: INFO
    ir.h0p3.securebankapi: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

  file:
    name: logs/secure-bank-api.log